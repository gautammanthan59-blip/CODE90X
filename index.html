        // --- Helpers ---
        const calculateTotalTeamSize = (node) => {
          if (!node.children || node.children.length === 0) return 1;
          return node.children.reduce((acc, child) => acc + calculateTotalTeamSize(child), 0);
        };

        const isNeedsFollowUp = (lastContacted) => {
          if (!lastContacted) return false;
          const daysSince = (new Date() - new Date(lastContacted)) / (1000 * 3600 * 24);
          return daysSince > 14; 
        };

        const extractLeaderboard = (node, list = []) => {
          if (node.type === 'manager' || node.type === 'group') {
            const teamSize = calculateTotalTeamSize(node);
            const actualGrowth = Math.min(node.growth || 0, teamSize);
            list.push({ name: node.name, growth: actualGrowth, size: teamSize, type: node.type });
          }
          if (node.children) {
            node.children.forEach(child => extractLeaderboard(child, list));
          }
          return list.sort((a, b) => b.growth - a.growth).slice(0, 10);
        };

        const addNodeToTree = (currentTree, parentName, newNode) => {
          if (currentTree.name === parentName) {
            return {
              ...currentTree,
              children: [...(currentTree.children || []), newNode]
            };
          }
          if (currentTree.children) {
            return {
              ...currentTree,
              children: currentTree.children.map(child => addNodeToTree(child, parentName, newNode))
            };
          }
          return currentTree;
        };

        const generateWithGemini = async (prompt) => {

          alert("AI Generation requires an active API key when deployed to your own domain.");
          return "This is a placeholder message. To use AI on your own domain, you will need to add a Google Gemini API Key in the code.";
        };

          const hasChildren = node.children && node.children.length > 0;
          const needsFollowUp = isNeedsFollowUp(node.lastContacted);

          useEffect(() => {
            if (searchTerm) setIsExpanded(true);
            else setIsExpanded(defaultExpanded);
          }, [searchTerm, defaultExpanded]);

          const getIcon = () => {
            if (node.type === 'root') return <Building2 className="w-5 h-5 text-amber-300" />;
            if (node.type === 'manager') return <User className="w-4 h-4 text-amber-500" />;

            const parts = text.split(new RegExp(`(${highlight})`, 'gi'));

          };

          const teamSize = calculateTotalTeamSize(node);

                  <div className="flex items-center justify-center w-5 h-5 mr-1 shrink-0">
                    {hasChildren ? (
                      isExpanded ? <ChevronDown className="w-4 h-4 text-amber-500/60" /> : <ChevronRight className="w-4 h-4 text-amber-500/60" />

                  <div className="bg-[#1a2c4e]/50 p-1.5 rounded shadow-sm border border-amber-500/20 shrink-0 relative">
                    {getIcon()}
                    {needsFollowUp && (
                      <span className="absolute -top-1 -right-1 flex h-3 w-3">
                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                        <span className="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
                      </span>
                    )}
                  </div>
                  
                  <span className={`text-sm sm:text-base tracking-wide flex items-center gap-1 ${hasChildren ? 'font-semibold text-amber-50' : 'text-blue-200'}`}>
                    {highlightText(node.name, searchTerm)}
                    {node.badges && node.badges.map((b, i) => <span key={i} className="text-sm">{b}</span>)}
                  </span>

                  {hasChildren && (
                    <div className="flex items-center ml-2 gap-2 flex-wrap">
                      <span className="hidden sm:inline-block text-[10px] uppercase tracking-wider font-bold bg-amber-500/10 text-amber-300 border border-amber-500/20 px-2 py-0.5 rounded">
                        Team: {teamSize}
                      </span>
                      {displayGrowth > 0 && (
                        <span className="text-[10px] uppercase tracking-wider font-bold bg-green-500/10 text-green-400 border border-green-500/30 px-2 py-0.5 rounded flex items-center gap-1">
                          <TrendingUp className="w-3 h-3" /> +{displayGrowth}
                        </span>
                      )}
                      {node.prospects > 0 && (
                        <span className="text-[10px] uppercase tracking-wider font-bold bg-purple-500/10 text-purple-300 border border-purple-500/30 px-2 py-0.5 rounded">
                          {node.prospects} Prospects
                        </span>
                      )}
                    </div>
                  )}
                </div>

                    >
                      <UserPlus className="w-3 h-3" /> <span className="hidden md:inline">Add</span>

                  )}

                      >
                        <Target className="w-3 h-3" /> <span className="hidden md:inline">Pitch</span>
                      </button>
                      <button 
                        onClick={(e) => { e.stopPropagation(); onAiAction(node, 'motivate'); }}
                        disabled={isLoadingThisNode}
                        className="flex items-center gap-1 px-2 py-1 text-xs font-semibold rounded bg-[#0f1932] hover:bg-amber-500/20 text-amber-400 border border-amber-500/30 transition-colors"
